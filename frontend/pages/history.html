<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historico — DeckBound</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } .font-display { font-family: 'Cinzel', serif; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <nav class="border-b border-gray-800 bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../index.html" class="font-display text-2xl text-amber-400 tracking-widest">DeckBound</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="../index.html" class="hover:text-gray-100 transition">Inicio</a>
        <a href="players.html" class="hover:text-gray-100 transition">Jogadores</a>
        <a href="matches.html" class="hover:text-gray-100 transition">Nova Partida</a>
        <a href="history.html" class="text-amber-400">Historico</a>
        <a href="ranking.html" class="hover:text-gray-100 transition">Ranking</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="font-display text-3xl text-amber-400 tracking-wider mb-8">Historico de Partidas</h1>

    <!-- Filtro por formato -->
    <div class="flex gap-3 mb-6">
      <select id="filtro-formato"
        class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-amber-500">
        <option value="">Todos os formatos</option>
        <option value="COMMANDER">Commander</option>
        <option value="STANDARD">Standard</option>
        <option value="DRAFT">Draft</option>
        <option value="PIONEER">Pioneer</option>
        <option value="MODERN">Modern</option>
      </select>
    </div>

    <div id="lista-partidas" class="space-y-3">
      <div class="text-gray-600 text-sm">Carregando...</div>
    </div>
  </main>

  <script type="module">
    import { api } from '../js/api.js';

    let todasPartidas = [];

    function renderPartidas(partidas) {
      const container = document.getElementById('lista-partidas');
      if (partidas.length === 0) {
        container.innerHTML = '<div class="text-gray-600 text-sm">Nenhuma partida encontrada.</div>';
        return;
      }
      container.innerHTML = partidas.map(m => {
        const jogadores = m.jogadores?.map(j => j.nomeExibido).join(', ') ?? '—';
        return `
          <a href="match-detail?id=${m.id}"
            class="flex flex-col md:flex-row md:items-center justify-between
                   bg-gray-900 border border-gray-800 hover:border-amber-500
                   rounded-lg px-5 py-4 transition cursor-pointer">
            <div class="flex items-center gap-4">
              <span class="text-xs font-medium bg-gray-800 border border-gray-700 text-amber-400 px-2 py-1 rounded">
                ${m.formato}
              </span>
              <div>
                <div class="text-sm text-gray-300">${jogadores}</div>
                <div class="text-xs text-gray-600 mt-1">${new Date(m.data).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })}</div>
              </div>
            </div>
            <div class="text-sm mt-2 md:mt-0">
              <span class="text-gray-500">Vencedor: </span>
              <span class="text-amber-400 font-medium">${m.vencedor?.nome ?? '—'}</span>
            </div>
          </a>
        `;
      }).join('');
    }

    document.getElementById('filtro-formato').addEventListener('change', function () {
      const val = this.value;
      renderPartidas(val ? todasPartidas.filter(m => m.formato === val) : todasPartidas);
    });

    try {
      todasPartidas = await api.matches.listar();
      renderPartidas(todasPartidas);
    } catch (e) {
      document.getElementById('lista-partidas').innerHTML =
        `<div class="text-red-400 text-sm">${e.message}</div>`;
    }
  </script>
</body>
</html>
