<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Partida — DeckBound</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Cinzel', serif; }
    .card-img { transition: transform 0.2s; }
    .card-img:hover { transform: scale(1.05); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <nav class="border-b border-gray-800 bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../index.html" class="font-display text-2xl text-amber-400 tracking-widest">DeckBound</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="../index.html" class="hover:text-gray-100 transition">Inicio</a>
        <a href="players.html" class="hover:text-gray-100 transition">Jogadores</a>
        <a href="matches.html" class="text-amber-400">Nova Partida</a>
        <a href="history.html" class="hover:text-gray-100 transition">Historico</a>
        <a href="ranking.html" class="hover:text-gray-100 transition">Ranking</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="font-display text-3xl text-amber-400 tracking-wider mb-8">Nova Partida</h1>

    <!-- Formato -->
    <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
      <label class="block text-gray-400 text-sm mb-2">Formato</label>
      <select id="select-formato"
        class="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 text-gray-100 focus:outline-none focus:border-amber-500">
        <option value="COMMANDER">Commander</option>
        <option value="STANDARD">Standard</option>
        <option value="DRAFT">Draft</option>
        <option value="PIONEER">Pioneer</option>
        <option value="MODERN">Modern</option>
        <option value="LEGACY">Legacy</option>
        <option value="PAUPER">Pauper</option>
        <option value="OTHER">Outro</option>
      </select>
    </section>

    <!-- Jogadores -->
    <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
      <h2 class="text-gray-300 font-medium mb-4">Jogadores</h2>
      <div id="lista-checkboxes" class="space-y-2 mb-4"></div>

      <!-- Guest -->
      <div class="border-t border-gray-800 pt-4">
        <p class="text-gray-500 text-sm mb-2">Jogador convidado (sem cadastro)</p>
        <div class="flex gap-2">
          <input id="input-guest" type="text" placeholder="Nome do convidado"
            class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-amber-500" />
          <button id="btn-add-guest"
            class="bg-gray-700 hover:bg-gray-600 text-sm px-4 py-2 rounded transition">
            Adicionar
          </button>
        </div>
      </div>

      <!-- Jogadores selecionados -->
      <div id="jogadores-selecionados" class="mt-4 space-y-3"></div>
    </section>

    <!-- Vencedor -->
    <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
      <label class="block text-gray-400 text-sm mb-2">Vencedor</label>
      <select id="select-vencedor"
        class="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 text-gray-100 focus:outline-none focus:border-amber-500">
        <option value="">Selecione o vencedor...</option>
      </select>
    </section>

    <!-- Observacoes -->
    <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
      <label class="block text-gray-400 text-sm mb-2">Observacoes (opcional)</label>
      <textarea id="input-obs" rows="3" placeholder="Algum comentário sobre a partida..."
        class="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-amber-500 resize-none"></textarea>
    </section>

    <div id="form-erro" class="text-red-400 text-sm mb-4 hidden"></div>

    <button id="btn-salvar"
      class="w-full bg-amber-500 hover:bg-amber-400 text-gray-950 font-semibold py-3 rounded-lg transition">
      Salvar Partida
    </button>
  </main>

  <!-- Modal Scryfall -->
  <div id="modal-scryfall" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 border border-gray-700 rounded-lg p-6 w-full max-w-lg mx-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-display text-amber-400 tracking-wider" id="modal-titulo">Buscar Comandante</h3>
        <button id="modal-fechar" class="text-gray-500 hover:text-gray-300">✕</button>
      </div>
      <div class="flex gap-2 mb-4">
        <input id="modal-input" type="text" placeholder="Nome da carta..."
          class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-amber-500" />
        <button id="modal-buscar"
          class="bg-amber-500 hover:bg-amber-400 text-gray-950 font-semibold px-4 py-2 rounded transition text-sm">
          Buscar
        </button>
      </div>
      <div id="modal-resultado" class="space-y-2 max-h-64 overflow-y-auto"></div>
    </div>
  </div>

  <script type="module">
    import { api } from '../js/api.js';

    let jogadores = [];       // { playerId, guestNome, nomeExibido, comandantes: [] }
    let playersDisponiveis = [];
    let modalCallback = null; // função chamada ao selecionar carta no modal

    // Carrega jogadores cadastrados como checkboxes
    async function inicializar() {
      try {
        playersDisponiveis = await api.players.listar();
        renderCheckboxes();
      } catch (e) {
        document.getElementById('lista-checkboxes').innerHTML =
          '<span class="text-red-400 text-sm">Erro ao carregar jogadores.</span>';
      }
    }

    function renderCheckboxes() {
      const container = document.getElementById('lista-checkboxes');
      if (playersDisponiveis.length === 0) {
        container.innerHTML = '<span class="text-gray-600 text-sm">Nenhum jogador cadastrado.</span>';
        return;
      }
      container.innerHTML = playersDisponiveis.map(p => `
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" value="${p.id}" data-nome="${p.nome}"
            class="checkbox-player w-4 h-4 accent-amber-500" />
          <span class="text-gray-300 text-sm">${p.nome}</span>
        </label>
      `).join('');

      document.querySelectorAll('.checkbox-player').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) {
            adicionarJogador({ playerId: Number(cb.value), nomeExibido: cb.dataset.nome });
          } else {
            removerJogador(null, cb.dataset.nome);
          }
        });
      });
    }

    function adicionarJogador({ playerId = null, guestNome = null, nomeExibido }) {
      if (jogadores.some(j => j.nomeExibido === nomeExibido)) return;
      jogadores.push({ playerId, guestNome, nomeExibido, comandantes: [] });
      renderJogadoresSelecionados();
      atualizarSelectVencedor();
    }

    function removerJogador(playerId, nomeExibido) {
      jogadores = jogadores.filter(j =>
        playerId ? j.playerId !== playerId : j.nomeExibido !== nomeExibido
      );
      renderJogadoresSelecionados();
      atualizarSelectVencedor();
    }

    function renderJogadoresSelecionados() {
      const isCommander = document.getElementById('select-formato').value === 'COMMANDER';
      const container = document.getElementById('jogadores-selecionados');
      if (jogadores.length === 0) { container.innerHTML = ''; return; }

      container.innerHTML = jogadores.map((j, idx) => `
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <div class="flex items-center justify-between mb-3">
            <span class="font-medium text-gray-100 text-sm">${j.nomeExibido}</span>
            ${j.guestNome ? `<button data-nome="${j.nomeExibido}"
              class="btn-rm-guest text-gray-600 hover:text-red-400 text-xs transition">Remover</button>` : ''}
          </div>
          ${isCommander ? `
            <div class="space-y-2">
              ${j.comandantes.map((c, ci) => `
                <div class="flex items-center gap-2 text-xs text-gray-400">
                  ${c.imageUrl ? `<img src="${c.imageUrl}" class="card-img w-8 rounded" alt="${c.nome}" />` : ''}
                  <span class="flex-1">${c.nome}</span>
                  <span class="text-amber-500">${c.role}</span>
                  <button data-jogidx="${idx}" data-cidx="${ci}"
                    class="btn-rm-cmd text-gray-600 hover:text-red-400 transition">✕</button>
                </div>
              `).join('')}
              <div class="flex gap-2 mt-2">
                <button data-jogidx="${idx}" data-role="COMMANDER"
                  class="btn-add-cmd text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded transition">
                  + Commander
                </button>
                <button data-jogidx="${idx}" data-role="PARTNER"
                  class="btn-add-cmd text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded transition">
                  + Partner
                </button>
                <button data-jogidx="${idx}" data-role="COMPANION"
                  class="btn-add-cmd text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded transition">
                  + Companion
                </button>
              </div>
            </div>
          ` : ''}
        </div>
      `).join('');

      // Eventos dos botoes de comandante
      document.querySelectorAll('.btn-add-cmd').forEach(btn => {
        btn.addEventListener('click', () => {
          const jogIdx = Number(btn.dataset.jogidx);
          const role   = btn.dataset.role;
          abrirModal(`Buscar ${role}`, async (carta) => {
            // Salva commander no backend e pega o ID
            const saved = await api.commanders.salvar({
              nome: carta.name,
              imageUrl: carta.image_uris?.normal ?? carta.card_faces?.[0]?.image_uris?.normal ?? null,
              scryfallId: carta.id,
            });
            jogadores[jogIdx].comandantes.push({
              commanderId: saved.id,
              nome: saved.nome,
              imageUrl: saved.imageUrl,
              role,
            });
            renderJogadoresSelecionados();
          });
        });
      });

      document.querySelectorAll('.btn-rm-cmd').forEach(btn => {
        btn.addEventListener('click', () => {
          jogadores[Number(btn.dataset.jogidx)].comandantes.splice(Number(btn.dataset.cidx), 1);
          renderJogadoresSelecionados();
        });
      });

      document.querySelectorAll('.btn-rm-guest').forEach(btn => {
        btn.addEventListener('click', () => removerJogador(null, btn.dataset.nome));
      });
    }

    function atualizarSelectVencedor() {
      const sel = document.getElementById('select-vencedor');
      sel.innerHTML = '<option value="">Selecione o vencedor...</option>';
      jogadores.forEach(j => {
         const opt = document.createElement('option');
        opt.value = j.playerId ?? `guest:${j.guestNome}`;
        opt.textContent = j.nomeExibido;
        sel.appendChild(opt);
    });
    }

    // Modal Scryfall
    function abrirModal(titulo, callback) {
      modalCallback = callback;
      document.getElementById('modal-titulo').textContent = titulo;
      document.getElementById('modal-input').value = '';
      document.getElementById('modal-resultado').innerHTML = '';
      document.getElementById('modal-scryfall').classList.remove('hidden');
      setTimeout(() => document.getElementById('modal-input').focus(), 100);
    }

    document.getElementById('modal-fechar').addEventListener('click', () => {
      document.getElementById('modal-scryfall').classList.add('hidden');
    });

    document.getElementById('modal-buscar').addEventListener('click', async () => {
      const nome = document.getElementById('modal-input').value.trim();
      if (!nome) return;
      const resultDiv = document.getElementById('modal-resultado');
      resultDiv.innerHTML = '<span class="text-gray-500 text-sm">Buscando...</span>';
      try {
        const data = await api.scryfall.buscarLista(nome);
        const cartas = data.data?.slice(0, 8) ?? [];
        if (cartas.length === 0) {
          resultDiv.innerHTML = '<span class="text-gray-500 text-sm">Nenhuma carta encontrada.</span>';
          return;
        }
        resultDiv.innerHTML = cartas.map((c, i) => {
          const img = c.image_uris?.small ?? c.card_faces?.[0]?.image_uris?.small ?? null;
          return `
            <button data-idx="${i}"
              class="btn-carta flex items-center gap-3 w-full text-left bg-gray-800 hover:bg-gray-700 rounded px-3 py-2 transition">
              ${img ? `<img src="${img}" class="w-8 rounded" alt="${c.name}" />` : ''}
              <div>
                <div class="text-sm text-gray-100">${c.name}</div>
                <div class="text-xs text-gray-500">${c.type_line}</div>
              </div>
            </button>
          `;
        }).join('');

        resultDiv.querySelectorAll('.btn-carta').forEach((btn, i) => {
          btn.addEventListener('click', async () => {
            document.getElementById('modal-scryfall').classList.add('hidden');
            await modalCallback(cartas[i]);
          });
        });
      } catch (e) {
        resultDiv.innerHTML = `<span class="text-red-400 text-sm">${e.message}</span>`;
      }
    });

    document.getElementById('modal-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('modal-buscar').click();
    });

    // Guest
    document.getElementById('btn-add-guest').addEventListener('click', () => {
      const nome = document.getElementById('input-guest').value.trim();
      if (!nome) return;
      adicionarJogador({ guestNome: nome, nomeExibido: nome });
      document.getElementById('input-guest').value = '';
    });

    // Re-render ao trocar formato
    document.getElementById('select-formato').addEventListener('change', renderJogadoresSelecionados);

    // Salvar partida
    document.getElementById('btn-salvar').addEventListener('click', async () => {
      const erroDiv = document.getElementById('form-erro');
      erroDiv.classList.add('hidden');

      const formato   = document.getElementById('select-formato').value;
      const vencedorRaw = document.getElementById('select-vencedor').value;
      const vencedorId = vencedorRaw.startsWith('guest:') ? null : Number(vencedorRaw);
      const obs       = document.getElementById('input-obs').value.trim();

      if (jogadores.length < 2) {
        erroDiv.textContent = 'Adicione ao menos 2 jogadores.';
        erroDiv.classList.remove('hidden');
        return;
      }
      if (!vencedorRaw) {
        erroDiv.textContent = 'Selecione o vencedor.';
        erroDiv.classList.remove('hidden');
        return;
      }

      const payload = {
        formato,
        vencedorId: vencedorId,
        observacoes: obs || null,
        jogadores: jogadores.map(j => ({
          playerId: j.playerId ?? null,
          guestNome: j.guestNome ?? null,
          comandantes: j.comandantes.map(c => ({
            commanderId: c.commanderId,
            role: c.role,
          })),
        })),
      };

      try {
        const match = await api.matches.criar(payload);
        window.location.href = `match-detail?id=${match.id}`;
      } catch (e) {
        erroDiv.textContent = e.message;
        erroDiv.classList.remove('hidden');
      }
    });

    inicializar();
  </script>
</body>
</html>
