<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partida — DeckBound</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } .font-display { font-family: 'Cinzel', serif; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <nav class="border-b border-gray-800 bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../index.html" class="font-display text-2xl text-amber-400 tracking-widest">DeckBound</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="../index.html" class="hover:text-gray-100 transition">Inicio</a>
        <a href="players.html" class="hover:text-gray-100 transition">Jogadores</a>
        <a href="matches.html" class="hover:text-gray-100 transition">Nova Partida</a>
        <a href="history.html" class="hover:text-gray-100 transition">Historico</a>
        <a href="ranking.html" class="hover:text-gray-100 transition">Ranking</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-10" id="conteudo">
    <div class="text-gray-600 text-sm">Carregando partida...</div>
  </main>

  <script type="module">
    import { api } from '../js/api.js';

    const params  = new URLSearchParams(window.location.search);
    const matchId = params.get('id');
    const main    = document.getElementById('conteudo');

    if (!matchId) {
      main.innerHTML = '<div class="text-red-400">ID de partida invalido.</div>';
    } else {
      try {
        const match = await api.matches.buscar(matchId);
        renderMatch(match);
      } catch (e) {
        main.innerHTML = `<div class="text-red-400">${e.message}</div>`;
      }
    }

    function renderMatch(m) {
      const data = new Date(m.data).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

      main.innerHTML = `
        <div class="flex items-center gap-3 mb-2">
          <a href="history.html" class="text-gray-600 hover:text-gray-400 text-sm transition">← Historico</a>
        </div>

        <div class="flex items-center gap-3 mb-6">
          <span class="text-xs font-medium bg-gray-800 border border-gray-700 text-amber-400 px-2 py-1 rounded">
            ${m.formato}
          </span>
          <span class="text-gray-500 text-sm">${data}</span>
        </div>

        <!-- Vencedor destaque -->
        <div class="bg-gray-900 border border-amber-500/40 rounded-lg p-6 mb-6 text-center">
          <div class="text-gray-500 text-sm mb-1">Vencedor</div>
          <div class="font-display text-2xl text-amber-400">${m.vencedor?.nome ?? '—'}</div>
        </div>

        <!-- Jogadores e comandantes -->
        <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
          <h2 class="text-gray-400 text-sm font-medium mb-4">Jogadores</h2>
          <div class="space-y-4">
            ${m.jogadores.map(j => `
              <div class="flex items-start justify-between">
                <div>
                  <div class="text-gray-100 text-sm font-medium">${j.nomeExibido}</div>
                  ${j.comandantes?.length > 0 ? `
                    <div class="flex gap-2 mt-2 flex-wrap">
                      ${j.comandantes.map(c => `
                        <div class="flex items-center gap-2 bg-gray-800 rounded px-2 py-1">
                          ${c.commander.imageUrl ? `
                            <img src="${c.commander.imageUrl}" class="w-6 rounded" alt="${c.commander.nome}" />
                          ` : ''}
                          <span class="text-xs text-gray-300">${c.commander.nome}</span>
                          <span class="text-xs text-amber-500">${c.role}</span>
                        </div>
                      `).join('')}
                    </div>
                  ` : ''}
                </div>
                ${j.player?.id === m.vencedor?.id ? `
                  <span class="text-amber-400 text-xs">Vencedor</span>
                ` : ''}
              </div>
            `).join('')}
          </div>
        </section>

        ${m.observacoes ? `
          <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-gray-400 text-sm font-medium mb-2">Observacoes</h2>
            <p class="text-gray-300 text-sm">${m.observacoes}</p>
          </section>
        ` : ''}

        <!-- Comentarios -->
        <section class="bg-gray-900 border border-gray-800 rounded-lg p-6 mb-6">
          <h2 class="text-gray-400 text-sm font-medium mb-4">Comentarios</h2>
          <div id="lista-comentarios" class="space-y-3 mb-4">
            ${m.comentarios?.length > 0 ? m.comentarios.map(c => renderComentario(c)).join('') :
              '<div class="text-gray-600 text-sm">Nenhum comentario ainda.</div>'}
          </div>
          <div class="border-t border-gray-800 pt-4">
            <select id="sel-player-comment"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-300 mb-2 focus:outline-none focus:border-amber-500">
              <option value="">Comentar como... (anonimo)</option>
              ${m.jogadores.filter(j => j.player).map(j =>
                `<option value="${j.player.id}">${j.nomeExibido}</option>`
              ).join('')}
            </select>
            <div class="flex gap-2">
              <input id="input-comentario" type="text" placeholder="Escreva um comentario..."
                class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                       placeholder-gray-600 focus:outline-none focus:border-amber-500" />
              <button id="btn-comentar"
                class="bg-amber-500 hover:bg-amber-400 text-gray-950 font-semibold px-4 py-2 rounded text-sm transition">
                Enviar
              </button>
            </div>
          </div>
        </section>

        <button id="btn-deletar-partida"
          class="text-red-500 hover:text-red-400 text-sm transition">
          Deletar esta partida
        </button>
      `;

      // Enviar comentario
      document.getElementById('btn-comentar').addEventListener('click', async () => {
        const texto    = document.getElementById('input-comentario').value.trim();
        const playerId = document.getElementById('sel-player-comment').value || null;
        if (!texto) return;
        try {
          const novo = await api.comments.criar(m.id, { texto, playerId: playerId ? Number(playerId) : null });
          const lista = document.getElementById('lista-comentarios');
          if (lista.querySelector('.text-gray-600')) lista.innerHTML = '';
          lista.insertAdjacentHTML('beforeend', renderComentario(novo));
          document.getElementById('input-comentario').value = '';
        } catch (e) {
          alert(e.message);
        }
      });

      document.getElementById('input-comentario').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-comentar').click();
      });

      // Deletar partida
      document.getElementById('btn-deletar-partida').addEventListener('click', async () => {
        if (!confirm('Deletar esta partida? Esta acao nao pode ser desfeita.')) return;
        try {
          await api.matches.deletar(m.id);
          window.location.href = 'history.html';
        } catch (e) {
          alert(e.message);
        }
      });
    }

    function renderComentario(c) {
      return `
        <div class="bg-gray-800 rounded-lg px-4 py-3">
          <div class="flex items-center justify-between mb-1">
            <span class="text-amber-400 text-xs font-medium">${c.player?.nome ?? 'Anonimo'}</span>
            <span class="text-gray-600 text-xs">${new Date(c.createdAt).toLocaleString('pt-BR')}</span>
          </div>
          <p class="text-gray-300 text-sm">${c.texto}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
