<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking — DeckBound</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } .font-display { font-family: 'Cinzel', serif; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <nav class="border-b border-gray-800 bg-gray-900">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../index.html" class="font-display text-2xl text-amber-400 tracking-widest">DeckBound</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="../index.html" class="hover:text-gray-100 transition">Inicio</a>
        <a href="players.html" class="hover:text-gray-100 transition">Jogadores</a>
        <a href="matches.html" class="hover:text-gray-100 transition">Nova Partida</a>
        <a href="history.html" class="hover:text-gray-100 transition">Historico</a>
        <a href="ranking.html" class="text-amber-400">Ranking</a>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="font-display text-3xl text-amber-400 tracking-wider mb-8">Ranking</h1>
    <div id="ranking" class="space-y-2">
      <div class="text-gray-600 text-sm">Carregando...</div>
    </div>
  </main>

  <script type="module">
    import { api } from '../js/api.js';

    const medalhas = ['', '1°', '2°', '3°'];

    try {
      const ranking = await api.players.ranking();
      const container = document.getElementById('ranking');

      if (ranking.length === 0) {
        container.innerHTML = '<div class="text-gray-600 text-sm">Nenhuma partida registrada ainda.</div>';
      } else {
        container.innerHTML = ranking.map((r, i) => {
          const pos = i + 1;
          const destaque = pos === 1
            ? 'border-amber-500/60 bg-amber-500/5'
            : pos === 2
            ? 'border-gray-500/40'
            : 'border-gray-800';

          return `
            <div class="flex items-center justify-between border ${destaque} rounded-lg px-5 py-4 bg-gray-900">
              <div class="flex items-center gap-4">
                <span class="text-2xl w-8 text-center font-display ${pos <= 3 ? 'text-amber-400' : 'text-gray-600'}">
                  ${medalhas[pos] ?? pos}
                </span>
                <span class="font-medium text-gray-100">${r.nome}</span>
              </div>
              <div class="text-right">
                <span class="text-amber-400 font-bold text-lg">${r.vitorias}</span>
                <span class="text-gray-500 text-sm ml-1">vitoria${r.vitorias !== 1 ? 's' : ''}</span>
              </div>
            </div>
          `;
        }).join('');
      }
    } catch (e) {
      document.getElementById('ranking').innerHTML =
        `<div class="text-red-400 text-sm">${e.message}</div>`;
    }
  </script>
</body>
</html>
