# DeckBound Application Properties

# Server
server.port=8080

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/deckbound}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
#validate, create, create-drop, update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Schema initialization
        #spring.sql.init.mode=always
        #spring.sql.init.schema-locations=classpath:schema.sql

# CORS (ajustar para o dominio do frontend em producao)
deckbound.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:5500}

# Logging
logging.level.com.deckbound=DEBUG
logging.level.org.hibernate.SQL=DEBUG
