version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: deckbound-db
    environment:
      POSTGRES_DB: deckbound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - deckbound_pgdata:/var/lib/postgresql/data

volumes:
  deckbound_pgdata:
